<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Setup Profile — SwapSkill</title>
  <link rel="manifest" href="/manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --primary: #3b82f6;
      --bg: #0f172a;
      --text: #f8fafc;
      --glass: rgba(30, 41, 59, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --danger: #ef4444;
      --success: #22c55e;
    }
    body {
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: var(--text); min-height: 100vh; margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    /* --- TTS Button Styles --- */
    #tts-btn {
      position: fixed; top: 20px; right: 20px; z-index: 9000;
      background: var(--primary); color: white; border: 1px solid var(--border);
      padding: 10px 18px; border-radius: 50px; cursor: pointer;
      font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease; backdrop-filter: blur(5px);
    }
    #tts-btn:hover { background: #2563eb; transform: translateY(-2px); }
    #tts-btn.playing { background: var(--success); animation: pulse-green 1.5s infinite; }

    /* Card */
    .container {
      background: var(--glass); backdrop-filter: blur(12px);
      border: 2px solid var(--border); border-radius: 24px;
      padding: 30px; width: 100%; max-width: 500px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
      display: none;
      transition: border-color 0.3s;
    }

    h2 { margin: 0 0 10px 0; text-align: center; color: #fff; }
    p.sub { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    
    .form-group { margin-bottom: 16px; position: relative; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
    
    input, textarea {
      width: 100%; padding: 14px; border-radius: 12px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      color: #fff; outline: none; box-sizing: border-box; font-size: 15px;
      transition: 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }
    
    /* Username Status Message */
    .status-msg { font-size: 12px; margin-top: 6px; height: 16px; font-weight:500;}
    .status-msg.error { color: var(--danger); }
    .status-msg.success { color: var(--success); }

    /* Avatar Grid */
    .avatar-label { text-align: center; margin-bottom: 12px; color: #fff; font-size: 14px; font-weight:600;}
    .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .avatar-opt {
      width: 100%; aspect-ratio: 1; border-radius: 50%; object-fit: cover;
      cursor: pointer; border: 2px solid transparent; transition: 0.2s;
      background: #334155;
    }
    .avatar-opt:hover { transform: scale(1.1); }
    .avatar-opt.selected { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59,130,246,0.3); transform: scale(1.1); }
    
    button {
      width: 100%; padding: 16px; background: var(--primary);
      border: none; border-radius: 12px; color: white; font-weight: 600;
      cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.2s;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
    }
    button:hover { background: #2563eb; transform: translateY(-2px); }
    button:disabled { opacity: 0.7; cursor: not-allowed; transform: translateY(0); }

    /* --- DYNAMIC TOAST --- */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: #0f172a; border: 2px solid var(--border);
      color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 500; font-size: 14px;
      transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { border-color: var(--success) !important; color: var(--success) !important; }
    .toast-error { border-color: var(--danger) !important; color: var(--danger) !important; }
    .shake-error { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both !important; border-color: var(--danger) !important; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }
    
    /* Loader Overlay */
    #loaderOverlay {
        position: fixed; inset: 0; background: #0f172a; z-index: 999;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s;
    }
    .loader { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width: 768px) {
        .container { padding: 20px; }
        .avatar-grid { gap: 8px; }
        #tts-btn { bottom: 20px; top: auto; right: 20px; }
        #toast { bottom: 80px; right: 50%; transform: translateX(50%) translateY(100px); width: 90%; text-align: center; }
        #toast.show { transform: translateX(50%) translateY(0); }
    }
  </style>
</head>
<body>

<div id="loaderOverlay"><div class="loader"></div></div>

<button id="tts-btn" title="Shortcut: Alt + S">🔊 Read Page</button>

<div class="container" id="mainContent">
  <h2 id="pageTitle">Setup Profile</h2>
  <p class="sub">Let's get to know you better</p>
  
  <div class="avatar-label">Choose an Avatar</div>
  <div class="avatar-grid" id="avatarGrid"></div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="e.g. Alex Smith">
  </div>
  
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="e.g. alex_s" style="text-transform: lowercase;">
    <div id="usernameMsg" class="status-msg"></div>
  </div>

  <div class="form-group">
    <label>University / College</label>
    <input type="text" id="university" placeholder="e.g. MIT">
  </div>
  
  <div class="form-group">
    <label>Bio</label>
    <textarea id="bio" rows="3" placeholder="I love coding and design..."></textarea>
  </div>
  
  <div class="form-group">
    <label>Skills I Offer (comma separated)</label>
    <input type="text" id="skillsOffered" placeholder="React, Python, Graphic Design">
  </div>

  <button id="saveBtn">Complete Setup</button>
</div>

<div id="toast"></div>

<script src="tts.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";
import { 
  getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp, collection, query, where, getDocs 
} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDwrZVBhR0VSbkbiktvkOsW3iSYJ6PFJ9A",
  authDomain: "swapskill.web.app",
  projectId: "swapskill-6e456"
});
const auth = getAuth(app);
const db = getFirestore(app);

// --- AUDIO CUES & UI HELPERS ---
const successSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
const errorSound = new Audio("https://assets.mixkit.co/active_storage/sfx/946/946-preview.mp3");
successSound.volume = 0.6; errorSound.volume = 0.5;

document.body.addEventListener('click', () => {
    successSound.play().then(() => { successSound.pause(); successSound.currentTime = 0; }).catch(()=>{});
    errorSound.play().then(() => { errorSound.pause(); errorSound.currentTime = 0; }).catch(()=>{});
}, { once: true });

const toastEl = document.getElementById('toast');
const container = document.getElementById('mainContent');
let toastTimeout;

function toast(msg, type = "info") {
    toastEl.textContent = msg; 
    toastEl.className = ''; 
    void toastEl.offsetWidth; 
    
    if (type === "error") {
        toastEl.classList.add("toast-error", "shake-error");
        errorSound.currentTime = 0; errorSound.play().catch(()=>{});
        
        // Shake the main container
        container.classList.remove("shake-error");
        void container.offsetWidth;
        container.classList.add("shake-error");

    } else if (type === "success") {
        toastEl.classList.add("toast-success");
        successSound.currentTime = 0; successSound.play().catch(()=>{});
        container.classList.remove("shake-error");
    }

    toastEl.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { toastEl.classList.remove('show'); }, 3500);
}

let currentUID = null;
let selectedAvatar = 'avatars/a1.png'; 
let isEditMode = false; 

const loader = document.getElementById('loaderOverlay');
const usernameInput = document.getElementById('username');
const usernameMsg = document.getElementById('usernameMsg');

const avatars = [
  'avatars/a1.png', 'avatars/a2.png', 'avatars/a3.png', 'avatars/a4.png',
  'avatars/a5.png', 'avatars/a6.png', 'avatars/a7.png', 'avatars/a8.png'
];
const grid = document.getElementById('avatarGrid');

avatars.forEach(src => {
  const img = document.createElement('img');
  img.src = src;
  img.className = 'avatar-opt';
  
  img.onclick = () => {
    document.querySelectorAll('.avatar-opt').forEach(el => el.classList.remove('selected'));
    img.classList.add('selected');
    selectedAvatar = src;
  };
  grid.appendChild(img);
});

onAuthStateChanged(auth, async u => {
  if(!u) return location.href = 'login.html';
  currentUID = u.uid;

  let googleName = u.displayName || "";
  let googleUser = u.email ? u.email.split('@')[0].replace(/[^a-z0-9_]/gi, '').toLowerCase() : "";
  
  if(u.photoURL) selectedAvatar = u.photoURL;

  const ref = doc(db, 'users', currentUID);
  const snap = await getDoc(ref);
  
  if(snap.exists()) {
    isEditMode = true; 
    const d = snap.data();
    
    document.getElementById('name').value = d.name || googleName;
    document.getElementById('username').value = d.username || googleUser;
    document.getElementById('university').value = d.university || "";
    document.getElementById('bio').value = d.bio || "";
    document.getElementById('skillsOffered').value = d.skillsOffered ? d.skillsOffered.join(', ') : "";
    
    if(d.avatarUrl) selectedAvatar = d.avatarUrl;
    
    document.getElementById('saveBtn').innerText = "Save Changes";
    document.getElementById('pageTitle').innerText = "Edit Profile";
  } else {
    isEditMode = false;
    document.getElementById('name').value = googleName;
    document.getElementById('username').value = googleUser;
    
    if(!u.photoURL) document.querySelector('.avatar-opt').classList.add('selected');
  }

  document.querySelectorAll('.avatar-opt').forEach(img => {
      if(img.getAttribute('src') === selectedAvatar) img.classList.add('selected');
  });

  loader.style.opacity = '0';
  setTimeout(() => {
    loader.style.display = 'none';
    container.style.display = 'block';
  }, 400);
});

let timeout = null;
usernameInput.addEventListener('input', (e) => {
    // Force Lowercase and Strip Special Characters instantly
    e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '');

    clearTimeout(timeout);
    const val = e.target.value.trim();
    usernameMsg.textContent = "Checking...";
    usernameMsg.className = "status-msg";
    
    if(val.length < 3) {
        usernameMsg.textContent = "Too short (min 3 chars)";
        usernameMsg.className = "status-msg error";
        return;
    }

    timeout = setTimeout(async () => {
        const q = query(collection(db, "users"), where("username", "==", val));
        const snap = await getDocs(q);
        
        let taken = false;
        snap.forEach(d => {
            if(d.id !== currentUID) taken = true; 
        });

        if(taken) {
            usernameMsg.textContent = "❌ Username taken";
            usernameMsg.className = "status-msg error";
        } else {
            usernameMsg.textContent = "✅ Available";
            usernameMsg.className = "status-msg success";
        }
    }, 500);
});

document.getElementById('saveBtn').onclick = async () => {
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const university = document.getElementById('university').value.trim();
  const bio = document.getElementById('bio').value.trim();
  const skillsStr = document.getElementById('skillsOffered').value.trim();
  const btn = document.getElementById('saveBtn');

  if(!name || !username || !university) {
      toast("Please fill in your Name, Username, and University.", "error");
      return;
  }

  btn.innerText = "Validating...";
  btn.disabled = true;

  const q = query(collection(db, "users"), where("username", "==", username));
  const snap = await getDocs(q);
  let taken = false;
  snap.forEach(d => { if(d.id !== currentUID) taken = true; });

  if(taken) {
      toast("Username is already taken! Please choose another.", "error");
      btn.innerText = isEditMode ? "Save Changes" : "Complete Setup";
      btn.disabled = false;
      return;
  }

  btn.innerText = "Saving...";

  try {
    const skillsArr = skillsStr.split(',').map(s => s.trim()).filter(s => s.length > 0);

    const userData = {
      name, username, university, bio,
      avatarUrl: selectedAvatar,
      skillsOffered: skillsArr,
      email: auth.currentUser.email || ""
    };

    if (!isEditMode) {
        userData.score = 0;
        userData.createdAt = serverTimestamp();
        userData.isBanned = false;
        userData.verified = false;
        
        await setDoc(doc(db, 'users', currentUID), userData);
    } else {
        await updateDoc(doc(db, 'users', currentUID), userData);
    }

    toast("Profile saved successfully!", "success");
    setTimeout(() => { location.href = "dashboard.html"; }, 1000);
    
  } catch(e) {
    console.error(e);
    toast("Error saving profile. Please check your connection.", "error");
    btn.innerText = isEditMode ? "Save Changes" : "Complete Setup";
    btn.disabled = false;
  }
};
</script>
</body>
</html>
